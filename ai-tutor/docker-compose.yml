version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: aitutor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    env_file: .env.example
    environment:
      - DATABASE_URL=postgresql://postgres:yourpassword@postgres:5432/aitutor
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./apps/api:/app
    env_file: .env.example
    environment:
      - DATABASE_URL=postgresql://postgres:yourpassword@postgres:5432/aitutor
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
