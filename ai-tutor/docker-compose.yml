version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: aitutor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]



  backend:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    env_file: .env.example
    environment:
      - DATABASE_URL=postgresql://postgres:yourpassword@postgres:5432/aitutor
    depends_on:
      - postgres



  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
