services:
  - type: web
    name: ai-tutor-api
    env: docker
    dockerContext: ./ai-tutor/apps/api
    dockerfilePath: ./ai-tutor/apps/api/Dockerfile
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false

  - type: worker
    name: ai-tutor-celery
    env: docker
    dockerContext: ./ai-tutor/apps/api
    dockerfilePath: ./ai-tutor/apps/api/Dockerfile
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
