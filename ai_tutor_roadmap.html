import os

def get_vectorstore(student_id: str, subject: str):

{title:'Step 2 — PDF text extraction with OCR fallback',steps:[
{t:'Install Tesseract OCR on your system',d:'This is required for scanned textbooks (many Indian state board books are scanned images).',code:'# Mac:\nbrew install tesseract\n# Ubuntu/Debian:\nsudo apt install tesseract-ocr\n# Windows: download installer from github.com/UB-Mannheim/tesseract',tags:['cmd','warn']},
{t:'Write PDF extraction service',d:'Create apps/api/app/services/pdf_service.py',code:`import fitz, pytesseract, re, io
from PIL import Image

def extract_text_smart(pdf_path: str) -> list[dict]:
    doc = fitz.open(pdf_path)
    pages = []
    for i, page in enumerate(doc):
        text = page.get_text('text').strip()
        if len(text) < 50:  # likely a scanned page
            pix = page.get_pixmap(dpi=300)
            img = Image.open(io.BytesIO(pix.tobytes('png')))
            text = pytesseract.image_to_string(img, lang='eng+hin')
        pages.append({'text': text, 'page': i+1})
    return pages

def detect_chapter(text: str) -> str | None:
    match = re.search(r'^([A-Z][A-Z\\s]{4,50})$', text, re.MULTILINE)
    return match.group(1).strip() if match else None

def chunk_pages(pages: list[dict], chunk_size=800, overlap=100) -> list[dict]:
    chunks = []
    current, current_meta = "", {}
    for page in pages:
        chapter = detect_chapter(page['text'])
        words = page['text'].split()
        for i in range(0, len(words), chunk_size - overlap):
            chunk_words = words[i:i+chunk_size]
            chunks.append({
                'text': ' '.join(chunk_words),
                'page': page['page'],
                'chapter': chapter or current_meta.get('chapter', 'Unknown')
            })
    return chunks`,tags:['file']},
]},

from app.services.pdf_service import extract_text_smart, chunk_pages
from app.core.vector_store import get_vectorstore
from langchain.schema import Document

@celery_app.task
def index_textbook(pdf_path: str, student_id: str,
                   subject: str, textbook_id: str):
    # 1. Extract text (with OCR fallback)
    pages = extract_text_smart(pdf_path)
    # 2. Chunk into 800-token pieces
    chunks = chunk_pages(pages)
    # 3. Convert to LangChain Documents
    docs = [Document(
        page_content=c['text'],
        metadata={'page': c['page'], 'chapter': c['chapter'],
                  'subject': subject, 'student_id': student_id}
    ) for c in chunks]
    # 4. Upsert to Pinecone
    vs = get_vectorstore(student_id, subject)
    vs.add_documents(docs)
    # 5. Update textbooks table status to 'ready'
    # TODO: update DB here
    return {'chunks_indexed': len(docs)}`,tags:['file']},

from app.tasks.indexing_tasks import index_textbook
import tempfile, os

router = APIRouter(prefix="/textbooks", tags=["textbooks"])

@router.post("/upload")
async def upload_textbook(
    subject: str,
    file: UploadFile = File(...),
    # current_user = Depends(get_current_user)  # add auth later
):
    # Save to temp file
    with tempfile.NamedTemporaryFile(suffix='.pdf', delete=False) as tmp:
        content = await file.read()
        tmp.write(content)
        tmp_path = tmp.name
    # Fire background indexing task

        pdf_path=tmp_path,
        student_id="test-student-1",  # replace with real user id
        subject=subject,
        textbook_id="new-id"
    )
    return {"task_id": task.id, "status": "indexing"}`,tags:['file']},

{title:'Step 5 — Build retrieval (the RAG search)',steps:[
{t:'Write the retrieval service',d:'Create apps/api/app/services/retrieval_service.py',code:`from app.core.vector_store import get_vectorstore

def retrieve_context(question: str, student_id: str,
                     subject: str, k: int = 5) -> str:
    vs = get_vectorstore(student_id, subject)
    # MMR reduces duplicate chunks in results
    docs = vs.max_marginal_relevance_search(question, k=k, fetch_k=20)
    return '\\n\\n---\\n\\n'.join(d.page_content for d in docs)`,tags:['file']},

{id:'p3',label:'Phase 3',title:'AI Teaching Engine & Voice',sub:'State machine · GPT-4o · Whisper · ElevenLabs · WebSocket',weeks:'Weeks 7–10',sections:[
{title:'Step 1 — Build the teaching state machine',steps:[
{t:'Create the state machine service',d:'Create apps/api/app/services/teaching_engine.py — this is the core of the product',code:`from enum import Enum

class TeachingState(str, Enum):
    GREET = "GREET"
    EXPLAIN = "EXPLAIN"
    QUESTION = "QUESTION"
    WAIT = "WAIT"
    EVALUATE = "EVALUATE"
    PRAISE = "PRAISE"
    SIMPLIFY = "SIMPLIFY"
    RETEACH = "RETEACH"
    DOUBT = "DOUBT"
    SUMMARY = "SUMMARY"

class SessionContext:
    def __init__(self, student_id, student_name, subject, grade):
        self.student_id = student_id
        self.student_name = student_name
        self.subject = subject
        self.grade = grade
        self.state = TeachingState.GREET
        self.history = []
        self.topic = ""
        self.wrong_streak = 0
        self.turn_count = 0
        self.elo = 1000

    def next_state(self, evaluation: str):
        if evaluation == "CORRECT":
            self.wrong_streak = 0
            self.state = TeachingState.PRAISE
        elif evaluation == "PARTIAL":
            self.state = TeachingState.SIMPLIFY
        elif evaluation == "WRONG":
            self.wrong_streak += 1
            if self.wrong_streak >= 2:
                self.state = TeachingState.RETEACH
        elif evaluation == "DOUBT":
            self.state = TeachingState.DOUBT`,tags:['file']},
]},
{title:'Step 2 — Write the system prompt and GPT-4o call',steps:[
{t:'Write the teacher prompt and LLM service',d:'Create apps/api/app/services/llm_service.py',code:`from openai import AsyncOpenAI
import os

client = AsyncOpenAI(api_key=os.getenv("OPENAI_API_KEY"))

TEACHER_PROMPT = """You are {student_name}'s personal AI teacher for {subject}, Grade {grade}.

RULES (never break):
1. Answer ONLY from the TEXTBOOK CONTEXT below. If not in context, say "Let me check our textbook".
2. Never give full answers before student tries. Guide with hints.
3. After every 2-3 sentences, STOP and ask ONE question.
4. If student writes in Hindi, respond in Hindi. Keep technical terms in English.
5. Keep each response under 100 words.

State: {state} | Topic: {topic} | Wrong streak: {wrong_streak}

TEXTBOOK CONTEXT:
{context}

CONVERSATION HISTORY:
{history}

Student said: '{student_input}'
Respond as the teacher:"""

async def get_teacher_response(ctx, student_input: str,
                                context: str) -> str:
    history_str = "\\n".join(
        f"{m['role']}: {m['content']}" for m in ctx.history[-10:]
    )
    prompt = TEACHER_PROMPT.format(
        student_name=ctx.student_name,
        subject=ctx.subject,
        grade=ctx.grade,
        state=ctx.state.value,
        topic=ctx.topic,
        wrong_streak=ctx.wrong_streak,
        context=context,
        history=history_str,
        student_input=student_input
    )
    response = await client.chat.completions.create(
        model="gpt-4o",
        messages=[{"role": "user", "content": prompt}],

{t:'Create Web Worker file at apps/web/workers/behaviorWorker.ts',d:'This runs off the main thread so the UI stays smooth.',code:`import { FaceMesh } from '@mediapipe/face_mesh'

const NOFACE_THRESHOLD = 3  // 3 seconds at 1fps
const GAZE_THRESHOLD = 10   // 10 seconds at 1fps

let gazeCount = 0, nofaceCount = 0
let faceMesh: FaceMesh

async function init() {
  faceMesh = new FaceMesh({locateFile: (f) =>
    \`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/\${f}\`})
  faceMesh.setOptions({maxNumFaces: 1, minDetectionConfidence: 0.5})
  faceMesh.onResults(handleResults)
}

function handleResults(results: any) {
  if (!results.multiFaceLandmarks?.length) {
    nofaceCount++
    if (nofaceCount >= NOFACE_THRESHOLD)
      self.postMessage({type: 'incident', kind: 'no_face'})
    return
  }
  nofaceCount = 0
  // Simple gaze: check nose tip vs eye center horizontal offset
  const nose = results.multiFaceLandmarks[0][1]
  const leftEye = results.multiFaceLandmarks[0][33]
  const score = 1 - Math.abs(nose.x - leftEye.x) * 3
  if (score < 0.35) {
    gazeCount++
    if (gazeCount >= GAZE_THRESHOLD)
      self.postMessage({type: 'incident', kind: 'gaze_away'})
  } else {
    gazeCount = 0
  }
}

self.onmessage = async ({data: {frame}}) => {
  if (!faceMesh) await init()
  await faceMesh.send({image: frame})
}`,tags:['file']},

{t:'Write question generation service',d:'Create apps/api/app/services/question_service.py — generates MCQ, short-answer, and descriptive in parallel',code:`from openai import AsyncOpenAI
import asyncio, json, os

client = AsyncOpenAI(api_key=os.getenv("OPENAI_API_KEY"))

async def generate_mcq(context: str, chapter: str) -> list:
    resp = await client.chat.completions.create(
        model="gpt-4o", temperature=0.2,
        messages=[{"role": "user", "content": f"""
Generate 5 MCQ questions from this textbook content.
Return ONLY a JSON array:
[{{"question":"...","options":["A","B","C","D"],"correct":"A","explanation":"..."}}]
Chapter: {chapter}
Content: {context[:3000]}"""}])
    return json.loads(resp.choices[0].message.content)

async def generate_short(context: str, chapter: str) -> list:
    resp = await client.chat.completions.create(
        model="gpt-4o", temperature=0.3,
        messages=[{"role": "user", "content": f"""
Generate 3 short-answer questions (2-3 sentence answers).
Return ONLY a JSON array:
[{{"question":"...","model_answer":"...","key_terms":["term1","term2"],"marks":3}}]
Chapter: {chapter}
Content: {context[:3000]}"""}])
    return json.loads(resp.choices[0].message.content)

async def generate_descriptive(context: str, chapter: str) -> list:
    resp = await client.chat.completions.create(
        model="gpt-4o", temperature=0.5,
        messages=[{"role": "user", "content": f"""
Generate 2 descriptive questions (paragraph answers).
Return ONLY a JSON array:
[{{"question":"...","rubric":"Criteria 1 (3pts): ...; Criteria 2 (2pts): ...","marks":5}}]
Chapter: {chapter}
Content: {context[:3000]}"""}])
    return json.loads(resp.choices[0].message.content)

async def generate_test(student_id: str, subject: str, chapter: str,
                         context: str) -> dict:
    # Run all 3 generators in parallel
    mcq, short, desc = await asyncio.gather(
        generate_mcq(context, chapter),
        generate_short(context, chapter),
        generate_descriptive(context, chapter)
    )
    return {"mcq": mcq, "short_answer": short, "descriptive": desc}`,tags:['file']},
]},
{title:'Step 2 — 3-tier auto-grading',steps:[
{t:'Write grading service',d:'Create apps/api/app/services/grading_service.py',code:`from sentence_transformers import SentenceTransformer, util
from openai import OpenAI
import json

model = SentenceTransformer('all-MiniLM-L6-v2')
client = OpenAI()

def grade_exact(answer: str, correct: str) -> float:
    return 1.0 if answer.strip().upper() == correct.strip().upper() else 0.0

def grade_short(student: str, model_ans: str,
                key_terms: list, marks: int) -> float:
    sim = float(util.cos_sim(
        model.encode(student), model.encode(model_ans)))
    term_hits = sum(1 for t in key_terms if t.lower() in student.lower())
    term_score = term_hits / max(len(key_terms), 1)
    composite = 0.6 * sim + 0.4 * term_score
    if composite > 0.80: return marks
    if composite > 0.60: return marks * 0.75
    if composite > 0.40: return marks * 0.5
    return 0.0

def grade_descriptive(student: str, rubric: str, marks: int) -> dict:
    resp = client.chat.completions.create(
        model="gpt-4o-mini",
        messages=[{"role": "user", "content": f"""
Grade this student answer. Return only JSON: {{"score": 0.0, "feedback": "..."}}
Marks available: {marks}
Rubric: {rubric}
Student answer: {student}"""}])
    return json.loads(resp.choices[0].message.content)`,tags:['file']},
]},
{title:'Step 3 — ELO update after test',steps:[
{t:'Write ELO update logic',d:'Add to apps/api/app/services/elo_service.py',code:`from supabase import create_client
import os

supabase = create_client(os.getenv("SUPABASE_URL"),
                          os.getenv("SUPABASE_SERVICE_KEY"))

def get_elo(student_id: str, subject: str, chapter: str) -> int:
    result = supabase.table("student_profiles")\\
        .select("elo_ratings").eq("user_id", student_id).single().execute()
    ratings = result.data.get("elo_ratings", {})
    return ratings.get(f"{subject}.{chapter}", 1000)

def update_elo_from_test(student_id: str, subject: str,
                          chapter: str, pct_score: float) -> dict:
    current = get_elo(student_id, subject, chapter)
    if pct_score >= 0.70:   delta = +25
    elif pct_score >= 0.50: delta = +5
    elif pct_score >= 0.30: delta = -10
    else:                   delta = -20
    new_elo = max(100, min(2000, current + delta))
    # Update in DB
    existing = supabase.table("student_profiles")\\
        .select("elo_ratings").eq("user_id", student_id).single().execute()
    ratings = existing.data.get("elo_ratings", {})
    ratings[f"{subject}.{chapter}"] = new_elo
    supabase.table("student_profiles")\\
        .update({"elo_ratings": ratings}).eq("user_id", student_id).execute()
    return {"old": current, "new": new_elo, "delta": delta}`,tags:['file']},
]},

const state = {}

function countSteps(phase){
  let total=0,done=0
  phase.sections.forEach(s=>s.steps.forEach(step=>{
    total++
    if(state[step.t]) done++
  }))
  return {total,done}
}

function toggle(stepTitle){
  state[stepTitle]=!state[stepTitle]
  render()
}

let currentPhase=0

function render(){
  const pnav=document.getElementById('pnav')
  const phasesEl=document.getElementById('phases')
  pnav.innerHTML=phases.map((p,i)=>`
    <button class="pnav ${i===currentPhase?'active':''}" onclick="switchPhase(${i})">${p.label}</button>
  `).join('')
  phasesEl.innerHTML=phases.map((p,i)=>{
    const {total,done}=countSteps(p)
    const pct=total?Math.round(done/total*100):0
    return `
    <div class="phase ${p.id} ${i===currentPhase?'active':''}">
      <div class="phase-header">
        <div class="phase-badge">${p.label}</div>
        <div class="phase-title">${p.title}</div>
        <div class="phase-sub">${p.sub}</div>
        <div class="phase-weeks">${p.weeks} · ${done}/${total} steps complete</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total steps</div></div>
        <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">Completed</div></div>
        <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">Progress</div></div>
      </div>
      ${p.sections.map(sec=>`
        <div class="section">
          <div class="section-title">${sec.title}</div>
          ${sec.steps.map(step=>`
            <div class="step" onclick="toggle('${step.t.replace(/'/g,"\\'")}')">
              <div class="cb ${state[step.t]?'done':''}"></div>
              <div class="step-body">
                <div class="step-title ${state[step.t]?'done-text':''}">${step.t}</div>
                ${step.d?`<div class="step-desc">${step.d}</div>`:''}
                ${step.code?`<div class="step-code">${step.code}</div>`:''}
                ${step.tags?step.tags.map(tag=>`<span class="tag tag-${tag}">${tag==='cmd'?'terminal':tag==='file'?'create file':tag==='warn'?'important':tag==='key'?'secret/key':tag}</span>`).join(''):''}
              </div>
            </div>
          `).join('')}
        </div>
      `).join('')}
      <div class="nav-btns">
        <button class="nav-btn" onclick="switchPhase(${i-1})" ${i===0?'disabled':''}>← Previous phase</button>
        <button class="nav-btn" onclick="switchPhase(${i+1})" ${i===phases.length-1?'disabled':''}>Next phase →</button>
      </div>
    </div>`
  }).join('')
}

function switchPhase(i){
  if(i<0||i>=phases.length)return
  currentPhase=i
  render()
  document.getElementById('phases').scrollIntoView({behavior:'smooth',block:'start'})
}

render()
</script>
